<script>
// Fallback: ensure all data arrays exist even if fbr-data.js was cached
(function() {
  var F = window.FBR;
  if (!F.activities)     F.activities     = [];
  if (!F.offers)         F.offers         = [];
  if (!F.closings)       F.closings       = [];
  if (!F.inbox)          F.inbox          = [];
  if (!F.ads)            F.ads            = { summary:{}, daily:[], campaigns:[], creatives:[], countries:[], attribution:[], recommendations:[] };
  if (!F.brokerStats)    F.brokerStats    = [];
  if (!F.calendarEvents) F.calendarEvents = [];
  if (!F.owners)         F.owners         = [];
  if (!F.adminUsers)     F.adminUsers     = [];
  if (!F.auditLog)       F.auditLog       = [];
  if (!F.aiConfig)       F.aiConfig       = { enabled:true, suggestedRepliesEnabled:true, autoRepliesEnabled:false, humanApprovalRequired:true, allowedChannels:[], allowedMessageTypes:[], forbiddenTopics:[], escalationRules:[] };
})();

// ─── LOGIN ──────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = React.useState('ceo@flamingobeachrealty.com');
  const [pass, setPass] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  function handleLogin(e) {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => { setLoading(false); onLogin(); }, 900);
  }

  const heroImgs = [
    'https://flamingobeachrealty.com/wp-content/uploads/2026/03/View.jpg',
    'https://flamingobeachrealty.com/wp-content/uploads/2024/08/00-Villa-Margarita-Flamingo-Beachfront.jpg',
    'https://flamingobeachrealty.com/wp-content/uploads/2023/12/Casa-Todo-Bien-1-3.jpg',
  ];

  return React.createElement('div', { style:{ display:'flex', height:'100vh', overflow:'hidden' } },
    // Left hero panel
    React.createElement('div', {
      style:{
        flex:'1 1 55%', position:'relative', display:'flex', flexDirection:'column',
        justifyContent:'flex-end', padding:'48px 56px',
        background:'linear-gradient(135deg,#0F2340 0%,#163061 55%,#1A3A72 100%)',
        overflow:'hidden',
      }
    },
      // Subtle texture overlay
      React.createElement('div', { style:{ position:'absolute', inset:0, background:'radial-gradient(ellipse at 65% 35%, rgba(192,155,87,0.18) 0%, transparent 60%)', pointerEvents:'none' } }),
      // Background property image
      React.createElement('img', {
        src:'https://flamingobeachrealty.com/wp-content/uploads/2024/08/00-Villa-Margarita-Flamingo-Beachfront.jpg',
        style:{ position:'absolute', inset:0, width:'100%', height:'100%', objectFit:'cover', opacity:0.07, pointerEvents:'none' },
        onError:()=>{},
      }),
      // Content
      React.createElement('div', { style:{ position:'relative', zIndex:2 } },
        React.createElement('div', { style:{ fontSize:10, fontWeight:700, color:'rgba(192,155,87,0.75)', letterSpacing:'0.16em', textTransform:'uppercase', marginBottom:20, fontFamily:'DM Sans,sans-serif' } },
          'Santa Cruz · Guanacaste · Costa Rica'),
        React.createElement('div', {
          style:{ fontSize:50, fontWeight:300, color:'#fff', fontFamily:'Cormorant Garamond,Georgia,serif', lineHeight:1.15, marginBottom:20 }
        }, 'Command Center\nfor a Premium\nReal Estate\nOperation.'),
        React.createElement('p', { style:{ fontSize:14, color:'rgba(255,255,255,0.5)', fontFamily:'DM Sans,sans-serif', fontWeight:300, lineHeight:1.75, maxWidth:440 } },
          'CRM de ejecución comercial + Market Intelligence para Santa Cruz, Guanacaste. Inventario real. Leads activos. Inteligencia geográfica accionable.'),
        React.createElement('div', { style:{ display:'flex', gap:32, marginTop:40, borderTop:'1px solid rgba(255,255,255,0.1)', paddingTop:32 } },
          [['$94.8M','Annual Volume'],['84','Active Leads'],['117','Listings Tracked']].map(([v,l]) =>
            React.createElement('div', { key:l },
              React.createElement('div', { style:{ fontSize:26, fontWeight:800, color:'#C09B57', fontFamily:'DM Sans,sans-serif' } }, v),
              React.createElement('div', { style:{ fontSize:11, color:'rgba(255,255,255,0.4)', fontFamily:'DM Sans,sans-serif', marginTop:3 } }, l),
            )
          ),
        ),
        // Property image strip
        React.createElement('div', { style:{ display:'flex', gap:8, marginTop:36 } },
          heroImgs.map((src,i) =>
            React.createElement('img', { key:i, src, style:{ height:58, width:88, objectFit:'cover', borderRadius:4, opacity:0.65, border:'1px solid rgba(255,255,255,0.12)' }, onError:e=>e.target.style.opacity=0 })
          ),
          React.createElement('div', { style:{ height:58, display:'flex', alignItems:'center', paddingLeft:10 } },
            React.createElement('span', { style:{ fontSize:11, color:'rgba(255,255,255,0.3)', fontFamily:'DM Sans,sans-serif' } }, '+109 properties'),
          ),
        ),
      ),
    ),

    // Right login panel
    React.createElement('div', {
      style:{ width:440, background:'#fff', display:'flex', flexDirection:'column', justifyContent:'center', padding:'56px 48px', boxShadow:'-8px 0 40px rgba(0,0,0,0.10)' }
    },
      // Brand mark
      React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:10, marginBottom:40 } },
        React.createElement('div', { style:{ width:38, height:38, background:'#0F2340', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center' } },
          React.createElement('span', { style:{ fontSize:20, fontWeight:900, color:'#C09B57', fontFamily:'DM Sans,sans-serif', letterSpacing:'-1px' } }, 'F')
        ),
        React.createElement('div', null,
          React.createElement('div', { style:{ fontSize:15, fontWeight:700, color:'#0F2340', fontFamily:'DM Sans,sans-serif', letterSpacing:'0.01em' } }, 'FBR Platform'),
          React.createElement('div', { style:{ fontSize:11, color:'#9C948A', fontFamily:'DM Sans,sans-serif' } }, 'CRM & Market Intelligence'),
        ),
      ),
      React.createElement('div', { style:{ marginBottom:32 } },
        React.createElement('h2', { style:{ fontSize:28, fontWeight:700, color:'#1A1814', fontFamily:'DM Sans,sans-serif', marginBottom:6 } }, 'Welcome back'),
        React.createElement('p', { style:{ fontSize:13, color:'#9C948A', fontFamily:'DM Sans,sans-serif' } }, 'Sign in to your owner dashboard'),
      ),
      React.createElement('form', { onSubmit:handleLogin },
        React.createElement('div', { style:{ marginBottom:16 } },
          React.createElement('label', { style:{ fontSize:10, fontWeight:700, color:'#5C5650', display:'block', marginBottom:6, fontFamily:'DM Sans,sans-serif', textTransform:'uppercase', letterSpacing:'0.1em' } }, 'Email'),
          React.createElement('input', { value:email, onChange:e=>setEmail(e.target.value), type:'email', style:{ width:'100%', padding:'11px 14px', border:'1px solid #E4DDD0', borderRadius:6, fontSize:13, fontFamily:'DM Sans,sans-serif', outline:'none', background:'#FAFAF7' } }),
        ),
        React.createElement('div', { style:{ marginBottom:28 } },
          React.createElement('label', { style:{ fontSize:10, fontWeight:700, color:'#5C5650', display:'block', marginBottom:6, fontFamily:'DM Sans,sans-serif', textTransform:'uppercase', letterSpacing:'0.1em' } }, 'Password'),
          React.createElement('input', { value:pass, onChange:e=>setPass(e.target.value), placeholder:'••••••••••', type:'password', style:{ width:'100%', padding:'11px 14px', border:'1px solid #E4DDD0', borderRadius:6, fontSize:13, fontFamily:'DM Sans,sans-serif', outline:'none', background:'#FAFAF7' } }),
        ),
        React.createElement('button', { type:'submit', disabled:loading, style:{
          width:'100%', padding:'13px', background: loading ? '#9C948A' : '#0F2340', color:'#fff', border:'none',
          borderRadius:6, fontSize:14, fontWeight:700, cursor: loading?'wait':'pointer', fontFamily:'DM Sans,sans-serif', transition:'background 0.2s', letterSpacing:'0.01em'
        } }, loading ? 'Authenticating…' : 'Access Platform →'),
      ),
      React.createElement('div', { style:{ marginTop:32, borderTop:'1px solid #F0EDE8', paddingTop:24, fontSize:11, color:'#9C948A', fontFamily:'DM Sans,sans-serif', textAlign:'center', lineHeight:1.6 } },
        'Owner CEO · Full Access · 15 team members'),
    ),
  );
}

// ─── APP ROUTER ─────────────────────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = React.useState(() => localStorage.getItem('fbr_authed') === '1');
  const [screen, setScreen] = React.useState(() => {
    const stored = localStorage.getItem('fbr_screen') || 'command-center';
    const MIGRATION = { 'dashboard':'command-center','leads':'re-omnichannel','pipeline':'re-omnichannel','activities':'re-calendar','offers':'re-omnichannel','inbox':'re-omnichannel','inventory':'mi-inventory','map':'mi-map','leads-map':'mi-map','market':'mi-inventory','supdem':'mi-pricing','pricing':'mi-pricing','recommendations':'mi-inventory','ads':'mkt-campaigns','ai':'admin-ai','branding':'admin-users','re-leads':'re-omnichannel','re-pipeline':'re-omnichannel','mi-pricing':'mkt-pricing-all','mi-map':'mi-inventory','mi-owners':'mi-inventory','mkt-paid':'mkt-campaigns' };
    return MIGRATION[stored] || stored;
  });
  const [selectedProp, setSelectedProp] = React.useState(null);
  const [tweakVisible, setTweakVisible] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('fbr_screen', screen); }, [screen]);
  React.useEffect(() => {
    if (loggedIn) localStorage.setItem('fbr_authed','1');
    else localStorage.removeItem('fbr_authed');
  }, [loggedIn]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  if (!loggedIn) return React.createElement(LoginScreen, { onLogin:()=>setLoggedIn(true) });

  // ── localStorage screen migration (old IDs → new IDs) ───────────────────
  const SCREEN_MIGRATION = {
    'dashboard':'command-center', 'leads':'re-omnichannel', 'pipeline':'re-omnichannel',
    'activities':'re-calendar', 'offers':'re-omnichannel', 'inbox':'re-omnichannel',
    'inventory':'mi-inventory', 'map':'mi-map', 'leads-map':'mi-map',
    'market':'mi-inventory', 'supdem':'mi-pricing', 'pricing':'mi-pricing',
    'recommendations':'mi-inventory', 'ads':'mkt-campaigns', 'ai':'admin-ai',
    'branding':'admin-users',
    're-leads':'re-omnichannel', 're-pipeline':'re-omnichannel',
    'mi-pricing':'mkt-pricing-all', 'mi-map':'mi-inventory', 'mi-owners':'mi-inventory', 'mkt-paid':'mkt-campaigns',
  };

  const navTo = (s) => { setScreen(SCREEN_MIGRATION[s] || s); };

  let content;
  switch(screen) {
    // ── Command Center ───────────────────────────────────────────────────────
    case 'command-center':  content = React.createElement(CommandCenter,         { setScreen:navTo }); break;

    // ── Revenue Engine ───────────────────────────────────────────────────────
    case 're-leads':        content = React.createElement(OmnichannelInbox,      { setScreen:navTo }); break;
    case 're-omnichannel':  content = React.createElement(OmnichannelInbox,      { setScreen:navTo }); break;
    case 're-pipeline':     content = React.createElement(OmnichannelInbox,      { setScreen:navTo }); break;
    case 're-calendar':     content = React.createElement(CalendarTours,         { setScreen:navTo }); break;
    case 're-brokers':      content = React.createElement(BrokerPerformance,     { setScreen:navTo }); break;

    // ── Market Intelligence ──────────────────────────────────────────────────
    case 'mi-inventory':    content = React.createElement(InventoryIntelligence,  { setScreen:navTo, setSelectedProp }); break;
    case 'mi-closings':     content = React.createElement(SalesClosings,          { setScreen:navTo }); break;
    case 'propdetail':      content = React.createElement(PropertyDetail,         { prop:selectedProp, setScreen:navTo }); break;

    // ── Marketing Performance ────────────────────────────────────────────────
    case 'mkt-campaigns':   content = React.createElement(CampaignCommandCenter,  { setScreen:navTo }); break;
    case 'mkt-listings':    content = React.createElement(AllListings,             { setScreen:navTo, setSelectedProp }); break;
    case 'mkt-pricing-all': content = React.createElement(PricingIntelligenceAll,  { setScreen:navTo }); break;
    case 'mkt-demographic': content = React.createElement(DemographicAnalysis,     { setScreen:navTo }); break;
    case 'mkt-supdem':      content = React.createElement(SupplyDemandIntelligence,{ setScreen:navTo }); break;
    case 'mkt-content':     content = React.createElement(ContentManaging,         { setScreen:navTo }); break;
    case 'mkt-cms':         content = React.createElement(WebsiteCMS,              { setScreen:navTo }); break;

    // ── Operations ───────────────────────────────────────────────────────────
    case 'ops-finance':     content = React.createElement(FinanceManager,        { setScreen:navTo }); break;
    case 'ops-invoicing':   content = React.createElement(ElectronicInvoicing,   { setScreen:navTo }); break;
    case 'ops-accounting':  content = React.createElement(AccountingManager,     { setScreen:navTo }); break;
    case 'ops-payroll':     content = React.createElement(PayrollManagement,     { setScreen:navTo }); break;
    case 'ops-banking':     content = React.createElement(BankingAccess,         { setScreen:navTo }); break;

    // ── Admin ────────────────────────────────────────────────────────────────
    case 'admin-users':     content = React.createElement(AdminUsers,            { setScreen:navTo }); break;
    case 'admin-roles':     content = React.createElement(AdminRoles,            { setScreen:navTo }); break;
    case 'admin-routing':   content = React.createElement(AdminLeadRouting,      { setScreen:navTo }); break;
    case 'admin-workflows': content = React.createElement(AdminWorkflows,        { setScreen:navTo }); break;
    case 'admin-data':      content = React.createElement(AdminData,             { setScreen:navTo }); break;
    case 'admin-audit':     content = React.createElement(AdminAuditLog,         { setScreen:navTo }); break;
    case 'admin-ai':        content = React.createElement(AdminAIControls,       { setScreen:navTo }); break;

    default:                content = React.createElement(PlaceholderScreen,     { title:screen });
  }

  return React.createElement('div', { style:{ position:'relative', height:'100vh' } },
    React.createElement(AppShell, { screen, setScreen:navTo }, content),

    // Tweaks panel
    tweakVisible && React.createElement('div', {
      style:{ position:'fixed', bottom:20, right:20, width:280, background:'#fff', border:'1px solid #E4DDD0', borderRadius:10, boxShadow:'0 8px 40px rgba(0,0,0,0.18)', zIndex:9999, fontFamily:'DM Sans,sans-serif', overflow:'hidden' }
    },
      React.createElement('div', { style:{ background:'#0F2340', padding:'12px 16px', display:'flex', justifyContent:'space-between', alignItems:'center' } },
        React.createElement('span', { style:{ color:'#fff', fontWeight:700, fontSize:13 } }, '⚙ Tweaks'),
        React.createElement('span', { onClick:()=>setTweakVisible(false), style:{ color:'rgba(255,255,255,0.5)', cursor:'pointer', fontSize:18, lineHeight:1 } }, '×'),
      ),
      React.createElement('div', { style:{ padding:'16px' } },
        React.createElement('div', { style:{ marginBottom:14 } },
          React.createElement('label', { style:{ fontSize:10, fontWeight:700, color:'#9C948A', display:'block', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.1em' } }, 'Navigate to Screen'),
          React.createElement('select', { onChange:e=>navTo(e.target.value), value:screen, style:{ width:'100%', padding:'8px 10px', border:'1px solid #E4DDD0', borderRadius:5, fontSize:12, fontFamily:'DM Sans,sans-serif', outline:'none' } },
            [
              ['— Command Center —',null],
              ['command-center','Command Center'],
              ['— Revenue Engine / CRM —',null],
              ['re-omnichannel','Omnichannel'],
              ['re-calendar','Calendar & Tours'],['re-brokers','Broker Performance'],
              ['— Commercial Ops —',null],
              ['mi-inventory','Inventory'],['mi-closings','Sales & Closings'],
              ['— Market Intelligence —',null],
              ['mkt-listings','All Listings'],['mkt-pricing-all','Pricing Intelligence'],['mkt-demographic','Demographic'],['mkt-supdem','Supply vs Demand'],
              ['— Marketing Performance —',null],
              ['mkt-campaigns','Campaign Center'],['mkt-content','Content'],['mkt-cms','Website CMS'],
              ['— Financial Ops —',null],
              ['ops-finance','Finance Manager'],['ops-invoicing','Electronic Invoicing'],['ops-accounting','Accounting'],['ops-payroll','Payroll'],['ops-banking','Banking Access'],
              ['— Admin —',null],
              ['admin-users','Users'],['admin-roles','Roles & Permissions'],['admin-routing','Lead Routing'],
              ['admin-workflows','Workflows'],['admin-data','Data Management'],['admin-audit','Audit Log'],['admin-ai','AI Controls'],
            ].map(([v,l]) => l===null
              ? React.createElement('option',{key:v,value:'',disabled:true,style:{color:'#9C948A',fontWeight:700}},v)
              : React.createElement('option',{key:v,value:v},l)
            ),
          ),
        ),
        React.createElement('div', { style:{ marginBottom:14 } },
          React.createElement('label', { style:{ fontSize:10, fontWeight:700, color:'#9C948A', display:'block', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.1em' } }, 'Session'),
          React.createElement('button', {
            onClick:()=>{ localStorage.removeItem('fbr_authed'); setLoggedIn(false); setTweakVisible(false); },
            style:{ padding:'7px 14px', border:'1px solid #FECACA', borderRadius:5, fontSize:12, cursor:'pointer', fontFamily:'DM Sans,sans-serif', color:'#B82929', background:'#FDE8E8', fontWeight:600 }
          }, '← Show Login Screen'),
        ),
        React.createElement('div', { style:{ fontSize:11, color:'#C09B57', fontFamily:'DM Sans,sans-serif', fontWeight:600 } }, '8 real listings · 8 live leads · Leaflet map'),
      ),
    ),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
