<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Realty Platform — CRM Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="fbr-data.js?v=5"></script>
<script>
// Fallback: ensure all data arrays exist
(function() {
  var F = window.FBR;
  if (!F.activities) F.activities = [];
  if (!F.offers)     F.offers     = [];
  if (!F.closings)   F.closings   = [];
  if (!F.inbox)      F.inbox      = [];
  if (!F.ads)        F.ads        = { summary:{}, daily:[], campaigns:[], creatives:[], countries:[], attribution:[], recommendations:[] };
})();
</script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body, #root { height:100%; font-family:'DM Sans', sans-serif; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#D4C9B8; border-radius:4px; }
.leaflet-container { background:#1A2A3A !important; }
.leaflet-popup-content-wrapper { border-radius:8px !important; padding:0 !important; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.3) !important; }
.leaflet-popup-content { margin:0 !important; }
</style>
</head>
<body>
<div id="root"></div>
<script src="fbr-ui.jsx" type="text/babel"></script>
<script src="fbr-views.jsx" type="text/babel"></script>
<script src="fbr-modules.jsx" type="text/babel"></script>
<script src="fbr-ads.jsx" type="text/babel"></script>
<script src="fbr-marketing.jsx" type="text/babel"></script>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"accentColor":"#C09B57","sidebarColor":"#0F2340","brandName":"Acme Realty","compactMode":false}/*EDITMODE-END*/;

// Legacy route redirect — map old localStorage screen values to new routes
const LEGACY_ROUTES = { leads:'omnichannel', pipeline:'omnichannel', inbox:'omnichannel', offers:'sales', map:'inventory', 'leads-map':'inventory' };

// ─── LOGIN ──────────────────────────────────────────────────────────────────
function LoginScreen({ onLogin }) {
  const [email, setEmail] = React.useState('demo@acmerealty.example');
  const [pass, setPass] = React.useState('');
  const [loading, setLoading] = React.useState(false);

  function handleLogin(e) {
    e.preventDefault();
    setLoading(true);
    setTimeout(() => { setLoading(false); onLogin(); }, 900);
  }

  // Mock striped placeholder thumbnails for the hero strip
  const ph = window.FBR && window.FBR._ph ? window.FBR._ph : ((l, h) => '');
  const heroImgs = [ph('AR-002', 210), ph('AR-003', 188), ph('AR-005', 158)];

  return React.createElement('div', { style:{ display:'flex', height:'100vh', overflow:'hidden' } },
    // Left hero panel
    React.createElement('div', {
      style:{
        flex:'1 1 55%', position:'relative', display:'flex', flexDirection:'column',
        justifyContent:'flex-end', padding:'48px 56px',
        background:'linear-gradient(135deg,#0F2340 0%,#163061 55%,#1A3A72 100%)',
        overflow:'hidden',
      }
    },
      React.createElement('div', { style:{ position:'absolute', inset:0, background:'radial-gradient(ellipse at 65% 35%, rgba(192,155,87,0.18) 0%, transparent 60%)', pointerEvents:'none' } }),
      // Content
      React.createElement('div', { style:{ position:'relative', zIndex:2 } },
        React.createElement('div', { style:{ fontSize:10, fontWeight:700, color:'rgba(192,155,87,0.75)', letterSpacing:'0.16em', textTransform:'uppercase', marginBottom:20, fontFamily:'DM Sans,sans-serif' } },
          'Demo · Mock Data Only'),
        React.createElement('div', {
          style:{ fontSize:50, fontWeight:300, color:'#fff', fontFamily:'Cormorant Garamond,Georgia,serif', lineHeight:1.15, marginBottom:20, whiteSpace:'pre-line' }
        }, 'Command Center\nfor a Premium\nReal Estate\nOperation.'),
        React.createElement('p', { style:{ fontSize:14, color:'rgba(255,255,255,0.5)', fontFamily:'DM Sans,sans-serif', fontWeight:300, lineHeight:1.75, maxWidth:440 } },
          'CRM de ejecución comercial. Inventario, leads activos y pipeline en un solo lugar. Demo con datos de muestra.'),
        React.createElement('div', { style:{ display:'flex', gap:32, marginTop:40, borderTop:'1px solid rgba(255,255,255,0.1)', paddingTop:32 } },
          [['$94.8M','Annual Volume'],['84','Active Leads'],['117','Listings Tracked']].map(([v,l]) =>
            React.createElement('div', { key:l },
              React.createElement('div', { style:{ fontSize:26, fontWeight:800, color:'#C09B57', fontFamily:'DM Sans,sans-serif' } }, v),
              React.createElement('div', { style:{ fontSize:11, color:'rgba(255,255,255,0.4)', fontFamily:'DM Sans,sans-serif', marginTop:3 } }, l),
            )
          ),
        ),
        // Property image strip (placeholders)
        React.createElement('div', { style:{ display:'flex', gap:8, marginTop:36 } },
          heroImgs.map((src,i) =>
            React.createElement('img', { key:i, src, style:{ height:58, width:88, objectFit:'cover', borderRadius:4, opacity:0.7, border:'1px solid rgba(255,255,255,0.12)' } })
          ),
          React.createElement('div', { style:{ height:58, display:'flex', alignItems:'center', paddingLeft:10 } },
            React.createElement('span', { style:{ fontSize:11, color:'rgba(255,255,255,0.3)', fontFamily:'DM Sans,sans-serif' } }, '+ mock properties'),
          ),
        ),
      ),
    ),

    // Right login panel
    React.createElement('div', {
      style:{ width:440, background:'#fff', display:'flex', flexDirection:'column', justifyContent:'center', padding:'56px 48px', boxShadow:'-8px 0 40px rgba(0,0,0,0.10)' }
    },
      // Brand mark
      React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:10, marginBottom:40 } },
        React.createElement('div', { style:{ width:38, height:38, background:'#0F2340', borderRadius:8, display:'flex', alignItems:'center', justifyContent:'center' } },
          React.createElement('span', { style:{ fontSize:18, fontWeight:900, color:'#C09B57', fontFamily:'DM Sans,sans-serif', letterSpacing:'-1px' } }, 'AR')
        ),
        React.createElement('div', null,
          React.createElement('div', { style:{ fontSize:15, fontWeight:700, color:'#0F2340', fontFamily:'DM Sans,sans-serif', letterSpacing:'0.01em' } }, 'Realty Platform'),
          React.createElement('div', { style:{ fontSize:11, color:'#9C948A', fontFamily:'DM Sans,sans-serif' } }, 'CRM Demo · Mock Data'),
        ),
      ),
      React.createElement('div', { style:{ marginBottom:32 } },
        React.createElement('h2', { style:{ fontSize:28, fontWeight:700, color:'#1A1814', fontFamily:'DM Sans,sans-serif', marginBottom:6 } }, 'Welcome back'),
        React.createElement('p', { style:{ fontSize:13, color:'#9C948A', fontFamily:'DM Sans,sans-serif' } }, 'Sign in to your owner dashboard'),
      ),
      React.createElement('form', { onSubmit:handleLogin },
        React.createElement('div', { style:{ marginBottom:16 } },
          React.createElement('label', { style:{ fontSize:10, fontWeight:700, color:'#5C5650', display:'block', marginBottom:6, fontFamily:'DM Sans,sans-serif', textTransform:'uppercase', letterSpacing:'0.1em' } }, 'Email'),
          React.createElement('input', { value:email, onChange:e=>setEmail(e.target.value), type:'email', style:{ width:'100%', padding:'11px 14px', border:'1px solid #E4DDD0', borderRadius:6, fontSize:13, fontFamily:'DM Sans,sans-serif', outline:'none', background:'#FAFAF7' } }),
        ),
        React.createElement('div', { style:{ marginBottom:28 } },
          React.createElement('label', { style:{ fontSize:10, fontWeight:700, color:'#5C5650', display:'block', marginBottom:6, fontFamily:'DM Sans,sans-serif', textTransform:'uppercase', letterSpacing:'0.1em' } }, 'Password'),
          React.createElement('input', { value:pass, onChange:e=>setPass(e.target.value), placeholder:'••••••••••', type:'password', style:{ width:'100%', padding:'11px 14px', border:'1px solid #E4DDD0', borderRadius:6, fontSize:13, fontFamily:'DM Sans,sans-serif', outline:'none', background:'#FAFAF7' } }),
        ),
        React.createElement('button', { type:'submit', disabled:loading, style:{
          width:'100%', padding:'13px', background: loading ? '#9C948A' : '#0F2340', color:'#fff', border:'none',
          borderRadius:6, fontSize:14, fontWeight:700, cursor: loading?'wait':'pointer', fontFamily:'DM Sans,sans-serif', transition:'background 0.2s', letterSpacing:'0.01em'
        } }, loading ? 'Authenticating…' : 'Access Platform →'),
      ),
      React.createElement('div', { style:{ marginTop:32, borderTop:'1px solid #F0EDE8', paddingTop:24, fontSize:11, color:'#9C948A', fontFamily:'DM Sans,sans-serif', textAlign:'center', lineHeight:1.6 } },
        'Owner CEO · Full Access · Mock workspace'),
    ),
  );
}

// ─── APP ROUTER ─────────────────────────────────────────────────────────────
function App() {
  const [loggedIn, setLoggedIn] = React.useState(() => localStorage.getItem('fbr_authed') === '1');
  const [screen, setScreen] = React.useState(() => {
    const stored = localStorage.getItem('fbr_screen') || 'dashboard';
    return LEGACY_ROUTES[stored] || stored;
  });
  const [selectedProp, setSelectedProp] = React.useState(null);
  const [tweakVisible, setTweakVisible] = React.useState(false);

  React.useEffect(() => { localStorage.setItem('fbr_screen', screen); }, [screen]);
  React.useEffect(() => {
    if (loggedIn) localStorage.setItem('fbr_authed','1');
    else localStorage.removeItem('fbr_authed');
  }, [loggedIn]);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweakVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweakVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  if (!loggedIn) return React.createElement(LoginScreen, { onLogin:()=>setLoggedIn(true) });

  const navTo = (s) => { setScreen(s); };

  let content;
  switch(screen) {
    case 'dashboard':   content = React.createElement(Dashboard,           { setScreen:navTo }); break;
    case 'omnichannel': content = React.createElement(OmnichannelWorkspace, { setScreen:navTo }); break;
    case 'activities':  content = React.createElement(Activities,           {}); break;
    case 'ads':         content = React.createElement(AdsIntelligence,      { setScreen:navTo }); break;
    case 'sales':       content = React.createElement(Sales,                {}); break;
    case 'marketing':   content = React.createElement(Marketing,            {}); break;
    case 'inventory':   content = React.createElement(Inventory,            { setScreen:navTo, setSelectedProp }); break;
    case 'propdetail':  content = React.createElement(PropertyDetail,       { prop:selectedProp, setScreen:navTo }); break;
    case 'ai':          content = React.createElement(AIAssistant,          {}); break;
    case 'branding':    content = React.createElement(BrandingSettings,     {}); break;
    default:            content = React.createElement(PlaceholderScreen,    { title:screen });
  }

  return React.createElement('div', { style:{ position:'relative', height:'100vh' } },
    React.createElement(AppShell, { screen, setScreen:navTo }, content),

    // Tweaks panel
    tweakVisible && React.createElement('div', {
      style:{ position:'fixed', bottom:20, right:20, width:280, background:'#fff', border:'1px solid #E4DDD0', borderRadius:10, boxShadow:'0 8px 40px rgba(0,0,0,0.18)', zIndex:9999, fontFamily:'DM Sans,sans-serif', overflow:'hidden' }
    },
      React.createElement('div', { style:{ background:'#0F2340', padding:'12px 16px', display:'flex', justifyContent:'space-between', alignItems:'center' } },
        React.createElement('span', { style:{ color:'#fff', fontWeight:700, fontSize:13 } }, '⚙ Tweaks'),
        React.createElement('span', { onClick:()=>setTweakVisible(false), style:{ color:'rgba(255,255,255,0.5)', cursor:'pointer', fontSize:18, lineHeight:1 } }, '×'),
      ),
      React.createElement('div', { style:{ padding:'16px' } },
        React.createElement('div', { style:{ marginBottom:14 } },
          React.createElement('label', { style:{ fontSize:10, fontWeight:700, color:'#9C948A', display:'block', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.1em' } }, 'Navigate to Screen'),
          React.createElement('select', { onChange:e=>navTo(e.target.value), value:screen, style:{ width:'100%', padding:'8px 10px', border:'1px solid #E4DDD0', borderRadius:5, fontSize:12, fontFamily:'DM Sans,sans-serif', outline:'none' } },
            [
              ['dashboard','Executive Dashboard'],
              ['omnichannel','Omnichannel'],
              ['activities','Activities'],
              ['ads','Ads Intelligence'],
              ['sales','Sales'],
              ['marketing','Marketing'],
              ['inventory','Properties'],
              ['ai','AI Assistant'],
              ['branding','Branding & Settings'],
            ].map(([v,l]) => React.createElement('option',{key:v,value:v},l)),
          ),
        ),
        React.createElement('div', { style:{ marginBottom:14 } },
          React.createElement('label', { style:{ fontSize:10, fontWeight:700, color:'#9C948A', display:'block', marginBottom:6, textTransform:'uppercase', letterSpacing:'0.1em' } }, 'Session'),
          React.createElement('button', {
            onClick:()=>{ localStorage.removeItem('fbr_authed'); setLoggedIn(false); setTweakVisible(false); },
            style:{ padding:'7px 14px', border:'1px solid #FECACA', borderRadius:5, fontSize:12, cursor:'pointer', fontFamily:'DM Sans,sans-serif', color:'#B82929', background:'#FDE8E8', fontWeight:600 }
          }, '← Show Login Screen'),
        ),
        React.createElement('div', { style:{ fontSize:11, color:'#C09B57', fontFamily:'DM Sans,sans-serif', fontWeight:600 } }, 'Mock data · 8 listings · 8 leads'),
      ),
    ),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
